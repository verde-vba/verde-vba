name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # Fetch verde-lsp sidecar binary (release-cycle independent; mirrors
      # the tree-sitter-vba.wasm pattern in the frontend job below).
      # `externalBin` in tauri.conf.json forces this to exist before any
      # cargo invocation — tauri-build validates it at build script time.
      # Sprint 32.E decision: macOS skips x86_64 (Apple Silicon only).
      - name: Fetch verde-lsp sidecar binary
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p src-tauri/binaries
          case "${{ matrix.os }}" in
            ubuntu-latest)  asset="verde-lsp-linux";       triple="x86_64-unknown-linux-gnu"; ext="" ;;
            macos-latest)   asset="verde-lsp-macos";       triple="aarch64-apple-darwin";     ext="" ;;
            windows-latest) asset="verde-lsp-windows.exe"; triple="x86_64-pc-windows-msvc";   ext=".exe" ;;
            *) echo "Unsupported runner ${{ matrix.os }}" >&2; exit 1 ;;
          esac
          dest="src-tauri/binaries/verde-lsp-${triple}${ext}"
          curl -fsSL -o "$dest" "https://github.com/verde-vba/verde-lsp/releases/download/v0.1.0/$asset"
          chmod +x "$dest"
      - run: cargo test --lib
      - run: cargo clippy --lib -- -D warnings
      - run: cargo fmt --check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Fetch tree-sitter-vba.wasm
        run: |
          mkdir -p public
          curl -fsSL \
            -o public/tree-sitter-vba.wasm \
            "https://github.com/verde-vba/treesitter-vba/releases/download/v0.1.0/tree-sitter-vba.wasm"
      - run: bun run tsc --noEmit
      - run: bun run test
